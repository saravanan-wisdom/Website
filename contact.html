<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Contact - Saravanan Wisdom</title>
    
    <link rel="icon" type="image/png" href="image/logo.png">
    
    <meta name="description" content="Welcome to the official contact website of Saravanan Wisdom.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Saravanan Wisdom",
      "url": "https://www.saravananwisdom.in/contact"
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #f1f5f9;
            --input-bg: #f8fafc;
            --success: #22c55e;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .contact-card {
            background: var(--card);
            padding: 50px 35px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 380px;
            animation: reveal 0.8s var(--ease);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 24px; }

        label {
            display: block; font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 10px; color: #94a3b8;
        }

        input, textarea {
            width: 100%; 
            padding: 16px 20px;
            border: 1.5px solid transparent; 
            border-radius: 18px;
            font-family: inherit; 
            font-size: 0.95rem; 
            font-weight: 500;
            transition: all 0.3s var(--ease); 
            background: var(--input-bg);
            color: var(--text); 
            box-sizing: border-box;
            display: block;
        }

        input { height: 55px; }
        textarea { height: 120px; resize: none; }
        
        input[name="name"] { text-transform: capitalize; }

        input:focus, textarea:focus {
            outline: none; 
            border-color: var(--primary); 
            background: #ffffff;
            transform: scale(1.02);
        }

        button {
            width: 100%; padding: 18px; background: var(--text);
            color: white; border: none; border-radius: 100px;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: all 0.4s var(--ease); margin-top: 10px;
        }

        button:hover {
            background: var(--primary); transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.2);
        }

        .back-link {
            display: block; text-align: center; margin-top: 25px;
            color: #94a3b8; text-decoration: none; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }

        #success-message { display: none; text-align: center; }
        
        .check-icon {
            width: 60px; height: 60px; background: #f0fdf4;
            color: var(--success); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 20px;
        }

        h3 { font-family: 'Sora'; font-size: 1.4rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="contact-card">
        <div id="form-container">
            <form id="contactForm">
                <input type="hidden" name="access_key" value="06a4dc29-8090-4901-b77a-67245c498f9c">
                <input type="hidden" name="subject" value="New Message">
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" autocapitalize="words" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" inputmode="email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label>Your Message</label>
                    <textarea name="message" required></textarea>
                </div>

                <button type="submit" id="submitBtn">Send Message</button>
            </form>
        </div>

        <div id="success-message">
            <div class="check-icon">✓</div>
            <h3>Message Sent! </h3>
            <a href="https://www.saravananwisdom.in" class="back-link">← Return Home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const formContainer = document.getElementById('form-container');
        const successMessage = document.getElementById('success-message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                if (response.status == 200) {
                    if (navigator.vibrate) { navigator.vibrate(50); }
                    form.reset(); 
                    formContainer.style.display = 'none';
                    successMessage.style.display = 'block';
                } else {
                    submitBtn.innerText = "Error. Try Again";
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                submitBtn.innerText = "Error. Try Again";
                submitBtn.disabled = false;
            });
        });
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Registers the SW and logs success/failure to the console
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker failed', err));
    });
  }
    </script>
    
</body>
</html>
