<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Internet Connection</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
            /* Using system fonts to match the mobile UI exactly */
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 22px;
            font-weight: 500; /* Medium weight */
            color: #000000;
            margin-bottom: 12px;
        }

        p {
            font-size: 17px;
            font-weight: 400;
            color: #909090; /* The specific light gray from your image */
            line-height: 1.4;
            margin-bottom: 40px;
        }

        .refresh-button {
            background-color: #ffffff;
            border: 1.5px solid #909090; /* Thin gray border */
            color: #444444;
            padding: 14px 0;
            width: 220px;
            font-size: 18px;
            border-radius: 12px; /* Smooth rounded corners */
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .refresh-button:active {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>No Internet Connection</h1>
        <p>Check your connection then<br>refresh the page</p>
        <button class="refresh-button" onclick="window.location.reload()">Refresh</button>
    </div>

</body>
</html>
