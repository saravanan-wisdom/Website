<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>No Internet Connection</title>
    <style>
        :root {
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --bg-color: #f3f7ff; 
            --btn-blue: #0066ff;
            --btn-text: #ffffff;
            --icon-color: #c7c7cc; 
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 90%;
            max-width: 360px;
        }

        /* Responsive scaling for Desktop */
        @media (min-width: 768px) {
            .container {
                max-width: 450px;
            }
            h1 {
                font-size: 28px;
            }
            p {
                font-size: 19px;
            }
        }

        .icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px auto;
        }
        
        .signal-icon {
            width: 100%;
            height: 100%;
            fill: var(--icon-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 10px 0;
        }

        p {
            font-size: 17px;
            color: var(--text-sub);
            line-height: 1.47;
            margin: 0 0 35px 0;
        }

        .refresh-button {
            position: relative;
            background-color: var(--btn-blue);
            border: none;
            color: var(--btn-text);
            padding: 14px 50px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.15);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease;
        }

        .refresh-button:active {
            transform: scale(0.98);
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-container">
            <svg class="signal-icon" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.03 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/>
            </svg>
        </div>
        
        <h1>No Internet Connection</h1>
        <p>Check your connection then<br>refresh the page</p>
        
        <button class="refresh-button" id="refreshBtn">
            Refresh
        </button>
    </div>

    <script>
        const btn = document.getElementById('refreshBtn');

        btn.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);

            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;

            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;

            setTimeout(() => {
                window.location.reload();
            }, 400); 
        });

        // AUTO-RECOVERY: Automatically reloads when the browser detects a connection
        window.addEventListener('online', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
