<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Saravanan Wisdom</title>
    
    <meta name="description" content="Welcome to the official website of Saravanan Wisdom.">
    <link rel="icon" type="image/png" href="image/logo.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Saravanan Wisdom",
      "url": "https://www.saravananwisdom.in/"
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: #f5f5f5;
            object-fit: cover;
            display: block;
            border: 1px solid #eee;
        }

        .bio h1 { font-size: 1.7rem; font-weight: 700; margin-bottom: 40px; letter-spacing: -0.04em; }

        .links-stack { display: flex; flex-direction: column; gap: 16px; }

        .link-card {
            display: flex;
            align-items: center;
            padding: 22px;
            text-decoration: none;
            color: #1a1a1a;
            background: #ffffff;
            border-radius: 18px; 
            font-weight: 600;
            font-size: 1.05rem;
            border: 1px solid #f0f0f0;
            border-left: 12px solid #ddd;
            transition: transform 0.1s ease, background-color 0.1s ease;
            cursor: pointer;
            user-select: none;
            outline: none;
        }

        .link-text { flex-grow: 1; text-align: center; }
        .icon-box, .spacer { width: 24px; display: flex; align-items: center; justify-content: center; }
        .link-card svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }

        .donation { border-left-color: #00bfa5; }
        .product { border-left-color: #6c63ff; }
        .youtube { border-left-color: #ff7675; }

        .link-card:active { transform: scale(0.97); }

        /* FOOTER STYLE */
        .footer-link {
            text-decoration: none; 
            display: block; 
            text-align: center;
            margin-top: 80px; 
            width: 100%; 
            padding-bottom: 20px;
        }
        .footer-name { 
            color: #64748b; 
            font-family: 'Sora', sans-serif; 
            font-size: 0.8rem; 
            letter-spacing: 6px; 
            font-weight: 800; 
            opacity: 0.4;
            text-transform: uppercase; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .footer-link:hover .footer-name {
            opacity: 1; 
            color: #2563eb; 
            letter-spacing: 8px; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="image/sj.jpg" alt="Saravanan" class="profile-pic">
        <div class="bio"><h1>Saravanan</h1></div>

        <div class="links-stack">
            <a href="support.html" class="link-card donation" data-active="#e6f9f6">
                <div class="spacer"></div>
                <span class="link-text">Support</span>
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                </div>
            </a>

            <a href="rudraksha.html" class="link-card product" data-active="#f1f0ff">
                <div class="spacer"></div>
                <span class="link-text">Product</span>
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                </div>
            </a>

            <a href="https://youtube.com/@Saravanan_Wisdom" target="_blank" class="link-card youtube" data-active="#fff2f1">
                <div class="spacer"></div>
                <span class="link-text">Youtube</span>
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="5" ry="5"></rect><path d="m10 9 5 3-5 3V9z"></path></svg>
                </div>
            </a>
        </div>

        <div class="footer-link">
            <div class="footer-name">&copy; Saravanan</div>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.link-card');
        cards.forEach(card => {
            const activeColor = card.getAttribute('data-active');
            const setStyle = () => { card.style.backgroundColor = activeColor; };
            const clearStyle = () => {
                card.style.backgroundColor = '#ffffff';
                card.blur(); 
            };
            card.addEventListener('touchstart', setStyle);
            card.addEventListener('touchend', clearStyle);
            card.addEventListener('mousedown', setStyle);
            card.addEventListener('mouseup', clearStyle);
            card.addEventListener('mouseleave', clearStyle);
        });
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Registers the SW and logs success/failure to the console
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker failed', err));
    });
  }
</script>
    
</body>
</html>
