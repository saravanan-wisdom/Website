<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Rudraksha - Saravanan Wisdom</title>
    
    <link rel="icon" type="image/png" href="image/logo.png">
    
    <meta name="description" content="Welcome to the official Product website of Saravanan Wisdom.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Saravanan Wisdom",
      "url": "https://www.saravananwisdom.in/rudraksha"
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --stone: #2d2424;
            --gold: #b38b4d;
            --cream: #f9f7f2;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--cream); 
            color: var(--stone);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        .product-card { 
            max-width: 400px; width: 100%;
            background: #fff; border-radius: 40px; 
            padding-bottom: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .hero-img { 
            width: 100%; height: 350px; 
            object-fit: cover; 
            display: block;
        }

        .main-info { padding: 30px 30px 10px 30px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin: 0; }
        .price { font-size: 1.3rem; color: var(--gold); margin: 10px 0; font-weight: 500; }
        .description { font-size: 0.95rem; color: #777; line-height: 1.6; }

        .stock-section { padding: 0 30px; margin: 20px 0; }
        .stock-text { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; text-align: center;}
        .progress-bg { height: 4px; background: #eee; border-radius: 10px; width: 100%; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--gold); transition: width 1s ease-in-out; }

        .values-list { 
            padding: 20px 30px; 
            background: #fafafa;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .value-item { 
            display: flex; align-items: center; 
            width: 48%;
            padding: 15px 0;
            box-sizing: border-box;
        }
        .value-item:nth-child(1), .value-item:nth-child(2) { border-bottom: 1px solid #efefef; }
        .icon { width: 25px; font-size: 1.2rem; color: var(--gold); margin-right: 10px; text-align: center; }
        .value-text { font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; }

        .btn-container { padding: 20px 30px 0 30px; }
        .contact-btn { 
            display: block; width: 100%; padding: 20px;
            background: var(--stone); color: white; border-radius: 20px;
            text-decoration: none; text-align: center; font-weight: 600;
            box-sizing: border-box; transition: 0.3s;
        }
        .contact-btn:hover { background: #000; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="product-card">
    <img src="image/Rudraksha.jpg" alt="Rudraksha" class="hero-img">

    <div class="main-info">
        <h1>Five Face Original</h1>
        <div class="price">₹ 30,000</div>
        <p class="description">Natural geometry engineered to stabilize the bio-field. A precision tool for dissolving noise and anchoring inner silence.</p>
    </div>

    <div class="stock-section">
        <span id="stock-label" class="stock-text">Checking stock...</span>
        <div class="progress-bg">
            <div id="progress-bar" class="progress-fill"></div>
        </div>
    </div>

    <div class="values-list">
        <div class="value-item">
            <div class="icon">✧</div>
            <div class="value-text">Purify</div>
        </div>
        <div class="value-item">
            <div class="icon">⚡</div>
            <div class="value-text">Energy</div>
        </div>
        <div class="value-item">
            <div class="icon">✋</div>
            <div class="value-text">Hand Made</div>
        </div>
        <div class="value-item">
            <div class="icon">📦</div>
            <div class="value-text">Delivery</div>
        </div>
    </div>

    <div class="btn-container">
        <a href="contact.html" class="contact-btn">Reserve Yours</a>
    </div>
</div>

<script>
    const currentStock = 3; 
    const totalStock = 3;

    const label = document.getElementById('stock-label');
    const bar = document.getElementById('progress-bar');

    const percentage = (currentStock / totalStock) * 100;

    if (currentStock <= 0) {
        label.innerText = "Sold Out";
        bar.style.width = "0%";
    } else {
        label.innerText = currentStock + " of " + totalStock + " Remaining";
        setTimeout(() => {
            bar.style.width = percentage + "%";
        }, 300);
    }
</script>

</body>
</html>
